name: Build and Deploy Backend Image

on:
  push:
    branches: [ main ]
    paths:
      - '**/*.java'
      - 'Dockerfile'
      - 'pom.xml'
      - '.github/workflows/backend-docker.yml'
  workflow_dispatch:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ss272730/movie:latest
            ss272730/movie:v1.${{ github.run_number }}

      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -fsSL -X POST "$RENDER_DEPLOY_HOOK";
          else
            echo "RENDER_DEPLOY_HOOK secret not set; skipping Render deploy trigger";
          fi

      - name: Wait for backend health (optional)
        env:
          HEALTH_URL: ${{ secrets.BACKEND_HEALTH_URL }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "BACKEND_HEALTH_URL not set; skipping health check";
            exit 0;
          fi
          echo "Waiting for backend health at $HEALTH_URL ..."
          for i in {1..60}; do
            if curl -fsS "$HEALTH_URL" | grep -q '"status":"UP"'; then
              echo "Backend is healthy"; exit 0;
            fi
            sleep 5;
          done
          echo "Health check failed"; exit 1;
